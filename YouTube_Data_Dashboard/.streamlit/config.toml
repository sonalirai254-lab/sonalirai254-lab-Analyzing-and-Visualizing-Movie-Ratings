# Streamlit configuration — applied locally and on Streamlit Community Cloud.
[theme]
base = "dark"
primaryColor = "#ef4444"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#111827"
textColor = "#f9fafb"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false